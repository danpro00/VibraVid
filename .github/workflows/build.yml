name: Build and Publish

on:
    workflow_dispatch:
        inputs:
            publish_pypi:
                description: "Pubblicare su PyPI (true) o compilare eseguibili? (false)"
                required: true
                default: "false"
                type: choice
                options:
                    - "true"
                    - "false"
    push:
        branches:
            - main
            - dev

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            tag_name: ${{ steps.info.outputs.tag_name }}
            is_release: ${{ steps.info.outputs.is_release }}
            changelog: ${{ steps.changelog.outputs.changelog }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check commit message for version
              id: info
              env:
                  COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
              run: |
                  RAW_VER=$(echo "$COMMIT_MESSAGE" | grep -iEo '(v|version\s*)[0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
                  if [ -n "$RAW_VER" ]; then
                      VER="v$RAW_VER"
                      echo "tag_name=$VER" >> $GITHUB_OUTPUT
                      echo "is_release=true" >> $GITHUB_OUTPUT
                      echo "Version found: $VER"
                  else
                      echo "tag_name=beta" >> $GITHUB_OUTPUT
                      echo "is_release=false" >> $GITHUB_OUTPUT
                      echo "No version found. Building beta."
                  fi

            - name: Generate changelog
              id: changelog
              run: |
                  PREV_TAG=$(git tag --sort=-version:refname | head -1 || true)
                  if [ -n "$PREV_TAG" ]; then
                      COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%B%n--SEP--" 2>/dev/null || git log --pretty=format:"%B%n--SEP--")
                  else
                      COMMITS=$(git log --pretty=format:"%B%n--SEP--")
                  fi

                  capitalize() { echo "$1" | sed 's/./\u&/' | tr '[:upper:]' '[:lower:]' | sed 's/^./\u&/'; }

                  declare -A SECTION_CONTENT

                  process_line() {
                      local input="$1"

                      # Split on each [TAG] occurrence by inserting a newline before each
                      local normalized
                      normalized=$(echo "$input" | sed 's/\s*\(\[[A-Za-z0-9_/]*\]\)/\n\1/g')

                      while IFS= read -r part; do
                          [ -z "$part" ] && continue

                          TAG=$(echo "$part" | grep -oE '^\[[A-Za-z0-9_/]+\]' | tr -d '[]' | tr '[:lower:]' '[:upper:]')
                          [ -z "$TAG" ] && continue

                          # Skip RELEASE tags
                          echo "$TAG" | grep -qiE '^RELEASE$' && continue

                          MSG=$(echo "$part" | sed 's/^\[[^]]*\][[:space:]]*//')
                          MSG=$(echo "$MSG" | sed 's/[[:space:]]*([[:space:]]*#[0-9]*[[:space:]]*)//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                          [ -z "$MSG" ] && continue

                          DISPLAY=$(capitalize "$TAG")
                          if [ -z "${SECTION_CONTENT[$DISPLAY]+x}" ]; then
                              SECTION_CONTENT["$DISPLAY"]="* $MSG"
                          else
                              if ! echo "${SECTION_CONTENT[$DISPLAY]}" | grep -qF "* $MSG"; then
                                  SECTION_CONTENT["$DISPLAY"]+=$'\n'"* $MSG"
                              fi
                          fi
                      done <<< "$normalized"
                  }

                  while IFS= read -r line; do
                      [ -z "$line" ] && continue
                      [ "$line" = "--SEP--" ] && continue
                      process_line "$line"
                  done <<< "$COMMITS"

                  CHANGELOG=""
                  for SECTION in $(echo "${!SECTION_CONTENT[@]}" | tr ' ' '\n' | sort); do
                      if [ -n "${SECTION_CONTENT[$SECTION]}" ]; then
                          CHANGELOG+="### $SECTION"$'\n'
                          CHANGELOG+="${SECTION_CONTENT[$SECTION]}"$'\n'
                          CHANGELOG+=$'\n'
                      fi
                  done

                  CURRENT_TAG="${{ steps.info.outputs.tag_name }}"
                  REPO="${{ github.repository }}"
                  if [ -n "$PREV_TAG" ] && [ "$CURRENT_TAG" != "beta" ]; then
                      CHANGELOG+="**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${CURRENT_TAG}"
                  fi

                  {
                      echo "changelog<<CHANGELOG_EOF"
                      echo "$CHANGELOG"
                      echo "CHANGELOG_EOF"
                  } >> $GITHUB_OUTPUT

    publish-pypi:
        needs: prepare
        if: needs.prepare.outputs.is_release == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_pypi == 'true')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install packaging dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade setuptools>=61.0.0 wheel twine build

            - name: Build package
              run: python -m build

            - name: Upload to PyPI
              env:
                  TWINE_USERNAME: __token__
                  TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
              run: twine upload --skip-existing dist/*

    build-binaries:
        needs: prepare
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_pypi == 'false')
        strategy:
            matrix:
                include:
                    - os: windows-2025
                      arch: x64
                      artifact_name: VibraVid_win_2025_x64
                      executable: VibraVid_win_2025_x64.exe
                      separator: ";"
                    - os: windows-2022
                      arch: x64
                      artifact_name: VibraVid_win_2022_x64
                      executable: VibraVid_win_2022_x64.exe
                      separator: ";"
                    - os: macos-26
                      arch: arm64
                      artifact_name: VibraVid_mac_26_arm64
                      executable: VibraVid_mac_26_arm64
                      separator: ":"
                    - os: macos-15
                      arch: x64
                      artifact_name: VibraVid_mac_15_x64
                      executable: VibraVid_mac_15_x64
                      separator: ":"
                    - os: macos-15
                      arch: arm64
                      artifact_name: VibraVid_mac_15_arm64
                      executable: VibraVid_mac_15_arm64
                      separator: ":"
                    - os: macos-14
                      arch: x64
                      artifact_name: VibraVid_mac_14_x64
                      executable: VibraVid_mac_14_x64
                      separator: ":"
                    - os: macos-14
                      arch: arm64
                      artifact_name: VibraVid_mac_14_arm64
                      executable: VibraVid_mac_14_arm64
                      separator: ":"
                    - os: ubuntu-24.04
                      arch: x64
                      artifact_name: VibraVid_linux_24_04_x64
                      executable: VibraVid_linux_24_04_x64
                      separator: ":"
                    - os: ubuntu-22.04
                      arch: x64
                      artifact_name: VibraVid_linux_22_04_x64
                      executable: VibraVid_linux_22_04_x64
                      separator: ":"

        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade certifi
                  python -m pip install -r requirements.txt
                  python -m pip install pyinstaller

            - name: Build executable with PyInstaller
              shell: bash
              run: |
                  pyinstaller --onefile \
                  --hidden-import=ua_generator \
                  --hidden-import=bs4 \
                  --hidden-import=rich \
                  --hidden-import=rich._unicode_data \
                  --collect-all rich \
                  --hidden-import=unidecode \
                  --hidden-import=editorconfig \
                  --hidden-import=six \
                  --hidden-import=pathvalidate \
                  --hidden-import=xml.etree.ElementTree \
                  --hidden-import=mutagen \
                  --hidden-import=pywidevine \
                  --hidden-import=pyplayready \
                  --hidden-import=ttconv \
                  --collect-all ttconv \
                  --collect-all mutagen \
                  --hidden-import=curl_cffi \
                  --hidden-import=_cffi_backend \
                  --collect-all curl_cffi \
                  --hidden-import=Cryptodome \
                  --hidden-import=Cryptodome.Cipher \
                  --hidden-import=Cryptodome.Cipher.AES \
                  --hidden-import=Cryptodome.Util \
                  --hidden-import=Cryptodome.Util.Padding \
                  --collect-all Cryptodome \
                  --exclude-module Cryptodome.SelfTest \
                  --additional-hooks-dir=pyinstaller/hooks \
                  --add-data "VibraVid${{ matrix.separator }}VibraVid" \
                  --name=${{ matrix.artifact_name }} manual.py

            - name: Upload executable to Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: dist/${{ matrix.executable }}

    publish-github-release:
        needs: [prepare, build-binaries]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - name: Download all executables
              uses: actions/download-artifact@v4
              with:
                  path: dist-artifacts
                  merge-multiple: true

            - name: Create or Update Release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag_name }}
                  commit: ${{ github.sha }}
                  name: ${{ needs.prepare.outputs.is_release == 'true' && format('Release {0}', needs.prepare.outputs.tag_name) || 'Beta Build' }}
                  prerelease: ${{ needs.prepare.outputs.is_release == 'false' }}
                  allowUpdates: true
                  replacesArtifacts: true
                  artifacts: "dist-artifacts/*"
                  body: ${{ needs.prepare.outputs.changelog }}
                  token: ${{ secrets.GITHUB_TOKEN }}
