name: Build and Publish Docker image

on:
    push:
        branches:
            - main
            - dev

permissions:
    contents: read
    packages: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            tag_name: ${{ steps.info.outputs.tag_name }}
            author: ${{ steps.info.outputs.author }}
        steps:
            - name: Check commit message for version
              id: info
              env:
                  COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
                  COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
              run: |
                  RAW_VER=$(echo "$COMMIT_MESSAGE" | grep -iEo '(v|version\s*)[0-9]+\.[0-9]+\.[0-9]+' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
                  if [ -n "$RAW_VER" ]; then
                      echo "tag_name=v$RAW_VER" >> $GITHUB_OUTPUT
                  else
                      echo "tag_name=" >> $GITHUB_OUTPUT
                  fi
                  BY_USER=$(echo "$COMMIT_MESSAGE" | grep -oP 'by @\K\S+' | head -1 || true)
                  if [ -z "$BY_USER" ]; then
                      BY_USER="${COMMIT_AUTHOR:-${{ github.actor }}}"
                  fi
                  echo "author=$BY_USER" >> $GITHUB_OUTPUT

    build-and-push:
        needs: check-version
        if: needs.check-version.outputs.tag_name != ''
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=raw,value=${{ needs.check-version.outputs.tag_name }}
                  labels: |
                      org.opencontainers.image.authors=${{ needs.check-version.outputs.author }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: false